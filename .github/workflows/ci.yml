name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify format
        run: |
          test -z "$(gofmt -l .)" || (echo "Run gofmt on these files:" && gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
