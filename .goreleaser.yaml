version: 2
project_name: killport

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats: 
      - tar.gz
    format_overrides:
      - goos: windows
        formats: 
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: paarths-collab
    name: killport

# Note: Keep the key as 'brews'. Ignore the warning about casks for now.
brews:
  - name: killport
    repository:
      owner: paarths-collab
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/paarths-collab/killport"
    description: "Lightning-fast, AI-agent optimized port killer."
    install: |
      bin.install "killport"

scoops:
  - name: killport
    repository:
      owner: paarths-collab
      name: scoop-bucket
    homepage: "https://github.com/paarths-collab/killport"
    description: "Lightning-fast, AI-agent optimized port killer."